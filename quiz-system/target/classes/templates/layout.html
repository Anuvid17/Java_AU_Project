<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' | QuizMaster' : 'QuizMaster - Online Quiz System'}">QuizMaster</title>
    <meta name="description" content="A comprehensive online quiz system with timed quizzes, leaderboards, and multiple categories">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top" sec:authorize="isAuthenticated()">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}">
            <i class="bi bi-mortarboard-fill text-accent"></i>
            <span>Quiz<span class="text-accent">Master</span></span>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-fill me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link" th:href="@{/quiz/categories}"><i class="bi bi-journal-code me-1"></i>Quizzes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/leaderboard}"><i class="bi bi-trophy-fill me-1"></i>Leaderboard</a>
                </li>
                <!-- Admin Menu -->
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-gear-fill me-1"></i>Admin
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark glass-dropdown">
                        <li><a class="dropdown-item" th:href="@{/admin/categories}"><i class="bi bi-folder me-2"></i>Categories</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/quizzes}"><i class="bi bi-journal-text me-2"></i>Quizzes</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/questions}"><i class="bi bi-question-circle me-2"></i>Questions</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/admin/scores}"><i class="bi bi-bar-chart me-2"></i>All Scores</a></li>
                    </ul>
                </li>
            </ul>

            <ul class="navbar-nav ms-auto">
                <li class="nav-item d-flex align-items-center">
                    <span class="badge bg-accent me-2" sec:authorize="hasRole('ADMIN')">ADMIN</span>
                    <span class="badge bg-info me-2" sec:authorize="hasRole('STUDENT')">STUDENT</span>
                    <span class="nav-link text-light" sec:authentication="name">User</span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm ms-2">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="main-content" th:fragment="content">
    <!-- Page content injected here -->
</main>

<!-- Footer -->
<footer class="text-center py-4 mt-5 glass-footer" sec:authorize="isAuthenticated()">
    <div class="container">
        <p class="text-muted mb-0">
            <i class="bi bi-mortarboard-fill text-accent"></i>
            QuizMaster &copy; 2026 | Built with Spring Boot &amp; Thymeleaf
        </p>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script th:src="@{/js/quiz-timer.js}"></script>

</body>
</html>
