<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}"><i class="bi bi-mortarboard-fill text-accent"></i><span>Quiz<span class="text-accent">Master</span></span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-fill me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/quiz/categories}"><i class="bi bi-journal-code me-1"></i>Quizzes</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/leaderboard}"><i class="bi bi-trophy-fill me-1"></i>Leaderboard</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><form th:action="@{/logout}" method="post" class="d-inline"><button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button></form></li>
            </ul>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="container">
        <div class="text-center mb-5 animate-fade-in">
            <h1 class="display-5 fw-bold"><i class="bi bi-trophy-fill text-accent me-2"></i>Leader<span class="text-accent">board</span></h1>
            <p class="text-muted lead">See who's leading in each category</p>
        </div>

        <!-- Category Tabs -->
        <ul class="nav nav-pills justify-content-center mb-4 gap-2 animate-fade-in">
            <li class="nav-item" th:each="cat : ${categories}">
                <a class="nav-link leaderboard-tab" th:href="@{/leaderboard/{id}(id=${cat.id})}"
                   th:classappend="${selectedCategoryId != null and selectedCategoryId == cat.id ? ' active' : ''}"
                   th:text="${cat.name}">Category</a>
            </li>
        </ul>

        <!-- Leaderboard Table -->
        <div class="glass-card p-0 overflow-hidden animate-slide-up" th:if="${results != null}">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead><tr><th style="width: 60px">Rank</th><th>Student</th><th>Quiz</th><th>Score</th><th>Percentage</th><th>Time Taken</th></tr></thead>
                    <tbody>
                        <tr th:each="result, iter : ${results}">
                            <td>
                                <span th:if="${iter.index == 0}" class="h5 mb-0">🥇</span>
                                <span th:if="${iter.index == 1}" class="h5 mb-0">🥈</span>
                                <span th:if="${iter.index == 2}" class="h5 mb-0">🥉</span>
                                <span th:if="${iter.index > 2}" th:text="${iter.index + 1}" class="text-muted">4</span>
                            </td>
                            <td class="fw-bold" th:text="${result.user.username}">user</td>
                            <td th:text="${result.quiz.title}">quiz</td>
                            <td th:text="${result.score + '/' + result.totalQuestions}">0/0</td>
                            <td>
                                <span class="badge" th:classappend="${result.percentage >= 70 ? 'bg-success' : (result.percentage >= 40 ? 'bg-warning text-dark' : 'bg-danger')}"
                                      th:text="${#numbers.formatDecimal(result.percentage, 0, 0) + '%'}">0%</span>
                            </td>
                            <td th:text="${result.timeTakenSeconds / 60 + 'm ' + result.timeTakenSeconds % 60 + 's'}">0m 0s</td>
                        </tr>
                        <tr th:if="${results.isEmpty()}"><td colspan="6" class="text-center text-muted py-5"><i class="bi bi-emoji-neutral h3 d-block mb-2"></i>No attempts yet in this category</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-4 mt-5 glass-footer"><p class="text-muted mb-0"><i class="bi bi-mortarboard-fill text-accent"></i> QuizMaster &copy; 2026</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
