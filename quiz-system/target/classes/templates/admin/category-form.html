<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Form | QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark glass-nav fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}"><i class="bi bi-mortarboard-fill text-accent me-2"></i>Quiz<span class="text-accent">Master</span></a>
    </div>
</nav>
<main class="main-content">
    <div class="container" style="max-width: 600px;">
        <h1 class="h3 fw-bold mb-4" th:text="${isEdit ? 'Edit Category' : 'Add Category'}">Form</h1>
        <div class="glass-card">
            <form th:action="@{/admin/categories/save}" method="post" th:object="${category}">
                <input type="hidden" th:field="*{id}" th:if="${isEdit}">
                <div class="mb-3">
                    <label class="form-label fw-medium">Category Name</label>
                    <input type="text" class="form-control glass-input" th:field="*{name}" required placeholder="e.g., Data Structures & Algorithms">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Description</label>
                    <textarea class="form-control glass-input" th:field="*{description}" rows="3" placeholder="Brief description"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Icon (Bootstrap Icon class)</label>
                    <input type="text" class="form-control glass-input" th:field="*{icon}" placeholder="e.g., bi-diagram-3">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Color (CSS color)</label>
                    <input type="text" class="form-control glass-input" th:field="*{color}" placeholder="e.g., #6366f1">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-accent"><i class="bi bi-check-circle me-1"></i>Save</button>
                    <a th:href="@{/admin/categories}" class="btn btn-outline-light">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
