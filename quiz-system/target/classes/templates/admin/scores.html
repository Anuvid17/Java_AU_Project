<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Scores | QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}"><i class="bi bi-mortarboard-fill text-accent"></i><span>Quiz<span class="text-accent">Master</span></span></a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-fill me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/categories}"><i class="bi bi-folder me-1"></i>Categories</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/quizzes}"><i class="bi bi-journal-text me-1"></i>Quizzes</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/questions}"><i class="bi bi-question-circle me-1"></i>Questions</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/scores}"><i class="bi bi-bar-chart me-1"></i>Scores</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><form th:action="@{/logout}" method="post" class="d-inline"><button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button></form></li>
            </ul>
        </div>
    </div>
</nav>
<main class="main-content">
    <div class="container">
        <h1 class="h3 fw-bold mb-4"><i class="bi bi-bar-chart text-accent me-2"></i>All User Scores</h1>
        <div class="glass-card p-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead><tr><th>#</th><th>Student</th><th>Quiz</th><th>Category</th><th>Score</th><th>Percentage</th><th>Time</th><th>Date</th></tr></thead>
                    <tbody>
                        <tr th:each="result, iter : ${results}">
                            <td th:text="${iter.index + 1}">1</td>
                            <td class="fw-bold" th:text="${result.user.username}">user</td>
                            <td th:text="${result.quiz.title}">quiz</td>
                            <td><span class="badge bg-secondary" th:text="${result.quiz.category.name}">cat</span></td>
                            <td th:text="${result.score + '/' + result.totalQuestions}">0/0</td>
                            <td>
                                <span class="badge" th:classappend="${result.percentage >= 70 ? 'bg-success' : (result.percentage >= 40 ? 'bg-warning text-dark' : 'bg-danger')}"
                                      th:text="${#numbers.formatDecimal(result.percentage, 0, 0) + '%'}">0%</span>
                            </td>
                            <td th:text="${result.timeTakenSeconds / 60 + 'm ' + result.timeTakenSeconds % 60 + 's'}">0m 0s</td>
                            <td th:text="${#temporals.format(result.attemptDate, 'MMM dd, yyyy HH:mm')}">date</td>
                        </tr>
                        <tr th:if="${results.isEmpty()}"><td colspan="8" class="text-center text-muted py-4">No quiz attempts yet</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<footer class="text-center py-4 mt-5 glass-footer"><p class="text-muted mb-0"><i class="bi bi-mortarboard-fill text-accent"></i> QuizMaster &copy; 2026</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
