<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Categories | QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}">
            <i class="bi bi-mortarboard-fill text-accent"></i><span>Quiz<span class="text-accent">Master</span></span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-fill me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/quiz/categories}"><i class="bi bi-journal-code me-1"></i>Quizzes</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/leaderboard}"><i class="bi bi-trophy-fill me-1"></i>Leaderboard</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="container">
        <div class="text-center mb-5 animate-fade-in">
            <h1 class="display-5 fw-bold">Choose a <span class="text-accent">Category</span></h1>
            <p class="text-muted lead">Select a topic area and challenge yourself with our curated quizzes</p>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-md-6 col-lg-3" th:each="category, iter : ${categories}">
                <a th:href="@{/quiz/category/{id}(id=${category.id})}" class="text-decoration-none">
                    <div class="category-card glass-card h-100 animate-slide-up" th:style="'animation-delay: ' + ${iter.index * 0.1} + 's'">
                        <div class="category-icon-lg" th:style="'background: linear-gradient(135deg, ' + ${category.color} + ', transparent)'">
                            <i class="bi" th:classappend="${category.icon}"></i>
                        </div>
                        <h3 class="h4 fw-bold mt-3" th:text="${category.name}">Category</h3>
                        <p class="text-muted mb-3" th:text="${category.description}">Description</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-dark"><span th:text="${category.quizzes.size()}">0</span> Quizzes</span>
                            <i class="bi bi-arrow-right text-accent"></i>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-4 mt-5 glass-footer">
    <p class="text-muted mb-0"><i class="bi bi-mortarboard-fill text-accent"></i> QuizMaster &copy; 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
