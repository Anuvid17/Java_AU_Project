<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${quiz.title + ' | QuizMaster'}">Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Minimal Navbar during quiz -->
<nav class="navbar navbar-dark glass-nav fixed-top">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-mortarboard-fill text-accent me-2"></i>
            <span th:text="${quiz.title}">Quiz</span>
        </span>

        <!-- Timer -->
        <div class="quiz-timer" id="quizTimer">
            <i class="bi bi-clock me-1"></i>
            <span id="timerDisplay">--:--</span>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="container" style="max-width: 800px;">

        <!-- Progress Bar -->
        <div class="quiz-progress mb-4 animate-fade-in">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Progress</span>
                <span class="text-muted"><span id="currentQuestion">1</span> / <span th:text="${totalQuestions}" id="totalQuestionsDisplay">12</span></span>
            </div>
            <div class="progress" style="height: 6px;">
                <div class="progress-bar bg-accent" id="progressBar" role="progressbar" style="width: 0%"></div>
            </div>
        </div>

        <!-- Quiz Form -->
        <form th:action="@{/quiz/submit}" method="post" id="quizForm">
            <input type="hidden" name="quizId" th:value="${quiz.id}">
            <input type="hidden" name="timeTaken" id="timeTakenInput" value="0">

            <!-- Question Cards (one per question, shown/hidden via JS) -->
            <div th:each="question, qIter : ${questions}" class="question-card glass-card animate-fade-in"
                 th:id="'question-' + ${qIter.index}" th:style="${qIter.index == 0 ? '' : 'display: none;'}">

                <div class="question-number">
                    <span class="badge bg-accent">Question <span th:text="${qIter.index + 1}">1</span></span>
                </div>

                <h3 class="h5 fw-medium mt-3 mb-4" th:text="${question.questionText}">Question text?</h3>

                <!-- Options -->
                <div class="options-list">
                    <div th:each="option, oIter : ${question.options}" class="option-item">
                        <input type="radio" class="btn-check"
                               th:name="'answer_' + ${question.id}"
                               th:value="${option.id}"
                               th:id="'option-' + ${option.id}"
                               autocomplete="off">
                        <label class="btn btn-outline-light option-label w-100 text-start"
                               th:for="'option-' + ${option.id}">
                            <span class="option-letter"></span>
                            <span th:text="${option.optionText}">Option text</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="quiz-navigation d-flex justify-content-between mt-4">
                <button type="button" class="btn btn-outline-light" id="prevBtn" onclick="navigateQuestion(-1)" disabled>
                    <i class="bi bi-chevron-left me-1"></i>Previous
                </button>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-accent" id="nextBtn" onclick="navigateQuestion(1)">
                        Next<i class="bi bi-chevron-right ms-1"></i>
                    </button>
                    <button type="submit" class="btn btn-success" id="submitBtn" style="display: none;" onclick="return confirmSubmit()">
                        <i class="bi bi-check-circle me-1"></i>Submit Quiz
                    </button>
                </div>
            </div>
        </form>

        <!-- Question Navigator (dots) -->
        <div class="question-navigator mt-4 glass-card animate-fade-in">
            <div class="text-muted small mb-2">Jump to question:</div>
            <div class="d-flex flex-wrap gap-2">
                <button type="button" th:each="question, qIter : ${questions}"
                        class="btn btn-sm question-dot"
                        th:classappend="${qIter.index == 0 ? ' active' : ''}"
                        th:text="${qIter.index + 1}"
                        th:onclick="'goToQuestion(' + ${qIter.index} + ')'">1</button>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    var totalQuestions = /*[[${totalQuestions}]]*/ 12;
    var durationSeconds = /*[[${durationSeconds}]]*/ 600;
    var quizId = /*[[${quiz.id}]]*/ 0;
</script>
<script th:src="@{/js/quiz-timer.js}"></script>
</body>
</html>
