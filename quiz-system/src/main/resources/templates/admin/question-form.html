<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question | QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark glass-nav fixed-top"><div class="container"><a class="navbar-brand fw-bold" th:href="@{/dashboard}"><i class="bi bi-mortarboard-fill text-accent me-2"></i>Quiz<span class="text-accent">Master</span></a></div></nav>
<main class="main-content">
    <div class="container" style="max-width: 700px;">
        <h1 class="h3 fw-bold mb-4"><i class="bi bi-plus-circle text-accent me-2"></i>Add Question</h1>
        <div class="glass-card">
            <form th:action="@{/admin/questions/save}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-medium">Select Quiz</label>
                    <select class="form-select glass-input" name="quizId" required>
                        <option value="">Choose quiz...</option>
                        <option th:each="quiz : ${quizzes}" th:value="${quiz.id}" th:text="${quiz.title + ' (' + quiz.category.name + ')'}"
                                th:selected="${selectedQuizId != null and selectedQuizId == quiz.id}">Quiz</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Question Text</label>
                    <textarea class="form-control glass-input" name="questionText" rows="3" required placeholder="Enter the question..."></textarea>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Option A</label>
                        <input type="text" class="form-control glass-input" name="option1" required placeholder="Option A">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Option B</label>
                        <input type="text" class="form-control glass-input" name="option2" required placeholder="Option B">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Option C</label>
                        <input type="text" class="form-control glass-input" name="option3" required placeholder="Option C">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Option D</label>
                        <input type="text" class="form-control glass-input" name="option4" required placeholder="Option D">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Correct Answer</label>
                    <select class="form-select glass-input" name="correctOption" required>
                        <option value="0">Option A</option>
                        <option value="1">Option B</option>
                        <option value="2">Option C</option>
                        <option value="3">Option D</option>
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-accent"><i class="bi bi-check-circle me-1"></i>Add Question</button>
                    <a th:href="@{/admin/questions}" class="btn btn-outline-light">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
