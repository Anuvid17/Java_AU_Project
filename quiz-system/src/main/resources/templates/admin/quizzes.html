<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Quizzes | QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}"><i class="bi bi-mortarboard-fill text-accent"></i><span>Quiz<span class="text-accent">Master</span></span></a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-fill me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/categories}"><i class="bi bi-folder me-1"></i>Categories</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/quizzes}"><i class="bi bi-journal-text me-1"></i>Quizzes</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/questions}"><i class="bi bi-question-circle me-1"></i>Questions</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/scores}"><i class="bi bi-bar-chart me-1"></i>Scores</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><form th:action="@{/logout}" method="post" class="d-inline"><button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button></form></li>
            </ul>
        </div>
    </div>
</nav>
<main class="main-content">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold"><i class="bi bi-journal-text text-accent me-2"></i>Manage Quizzes</h1>
            <a th:href="@{/admin/quizzes/add}" class="btn btn-accent"><i class="bi bi-plus-circle me-1"></i>Add Quiz</a>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        <div class="glass-card p-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead><tr><th>#</th><th>Title</th><th>Category</th><th>Duration</th><th>Questions</th><th>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="quiz, iter : ${quizzes}">
                            <td th:text="${iter.index + 1}">1</td>
                            <td class="fw-bold" th:text="${quiz.title}">Title</td>
                            <td><span class="badge bg-secondary" th:text="${quiz.category.name}">Cat</span></td>
                            <td th:text="${quiz.durationMinutes + ' min'}">15 min</td>
                            <td><span class="badge bg-info" th:text="${quiz.questions.size()}">0</span></td>
                            <td>
                                <a th:href="@{/admin/questions(quizId=${quiz.id})}" class="btn btn-sm btn-outline-info me-1" title="View Questions"><i class="bi bi-list-ul"></i></a>
                                <a th:href="@{/admin/quizzes/edit/{id}(id=${quiz.id})}" class="btn btn-sm btn-outline-warning me-1"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/admin/quizzes/delete/{id}(id=${quiz.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this quiz?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<footer class="text-center py-4 mt-5 glass-footer"><p class="text-muted mb-0"><i class="bi bi-mortarboard-fill text-accent"></i> QuizMaster &copy; 2026</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
