<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <div class="auth-card glass-card animate-fade-in">
        <div class="text-center mb-4">
            <div class="auth-logo">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h1 class="h3 fw-bold mt-3">Create Account</h1>
            <p class="text-muted">Join QuizMaster today</p>
        </div>

        <!-- Registration Form -->
        <form th:action="@{/register}" method="post" th:object="${user}">
            <!-- Username field errors -->
            <div th:if="${#fields.hasErrors('username')}" class="alert alert-danger py-2">
                <small th:each="err : ${#fields.errors('username')}" th:text="${err}"></small>
            </div>

            <div class="mb-3">
                <label for="reg-username" class="form-label fw-medium">Username</label>
                <div class="input-group">
                    <span class="input-group-text glass-input-icon"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control glass-input" id="reg-username"
                           th:field="*{username}" placeholder="Choose a username" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="reg-password" class="form-label fw-medium">Password</label>
                <div class="input-group">
                    <span class="input-group-text glass-input-icon"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control glass-input" id="reg-password"
                           th:field="*{password}" placeholder="Create a password" required>
                </div>
                <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1">
                    <span th:each="err : ${#fields.errors('password')}" th:text="${err}"></span>
                </div>
            </div>

            <div class="mb-4">
                <label for="reg-confirm" class="form-label fw-medium">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text glass-input-icon"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control glass-input" id="reg-confirm"
                           th:field="*{confirmPassword}" placeholder="Confirm your password" required>
                </div>
                <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger small mt-1">
                    <span th:each="err : ${#fields.errors('confirmPassword')}" th:text="${err}"></span>
                </div>
            </div>

            <button type="submit" class="btn btn-accent w-100 btn-lg mb-3">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>

        <div class="text-center mt-3">
            <p class="text-muted">Already have an account?
                <a th:href="@{/login}" class="text-accent fw-medium">Sign in</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
