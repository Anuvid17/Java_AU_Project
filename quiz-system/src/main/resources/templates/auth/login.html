<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="auth-page">

<div class="auth-container">
    <!-- Animated background shapes -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <div class="auth-card glass-card animate-fade-in">
        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="auth-logo">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h1 class="h3 fw-bold mt-3">Welcome Back</h1>
            <p class="text-muted">Sign in to QuizMaster</p>
        </div>

        <!-- Alert Messages -->
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>Invalid username or password!
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${param.logout}" class="alert alert-info alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i>You have been logged out successfully.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-medium">Username</label>
                <div class="input-group">
                    <span class="input-group-text glass-input-icon"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control glass-input" id="username" name="username"
                           placeholder="Enter your username" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-medium">Password</label>
                <div class="input-group">
                    <span class="input-group-text glass-input-icon"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control glass-input" id="password" name="password"
                           placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-accent w-100 btn-lg mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <div class="text-center mt-3">
            <p class="text-muted">Don't have an account?
                <a th:href="@{/register}" class="text-accent fw-medium">Register here</a>
            </p>
        </div>

        <!-- Demo Credentials -->
        <div class="demo-credentials mt-4">
            <p class="text-muted mb-2 small"><i class="bi bi-info-circle me-1"></i>Demo Credentials:</p>
            <div class="row g-2">
                <div class="col-6">
                    <div class="demo-cred-card" onclick="fillCredentials('admin', 'admin123')">
                        <span class="badge bg-warning mb-1">Admin</span>
                        <small class="d-block">admin / admin123</small>
                    </div>
                </div>
                <div class="col-6">
                    <div class="demo-cred-card" onclick="fillCredentials('student', 'student123')">
                        <span class="badge bg-info mb-1">Student</span>
                        <small class="d-block">student / student123</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function fillCredentials(username, password) {
    document.getElementById('username').value = username;
    document.getElementById('password').value = password;
}
</script>
</body>
</html>
