<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result | QuizMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}">
            <i class="bi bi-mortarboard-fill text-accent"></i><span>Quiz<span class="text-accent">Master</span></span>
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-fill me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/quiz/categories}"><i class="bi bi-journal-code me-1"></i>Quizzes</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/leaderboard}"><i class="bi bi-trophy-fill me-1"></i>Leaderboard</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="container" style="max-width: 800px;">

        <!-- Score Card -->
        <div class="result-card glass-card text-center mb-5 animate-fade-in">
            <div class="score-circle mb-4"
                 th:classappend="${result.percentage >= 70 ? ' score-high' : (result.percentage >= 40 ? ' score-medium' : ' score-low')}">
                <div class="score-value">
                    <span class="display-4 fw-bold" th:text="${#numbers.formatDecimal(result.percentage, 0, 0)}">75</span>
                    <span class="h5">%</span>
                </div>
            </div>

            <h1 class="h3 fw-bold mb-2" th:text="${result.percentage >= 70 ? 'Excellent! 🎉' : (result.percentage >= 40 ? 'Good Try! 👍' : 'Keep Practicing! 💪')}">Result</h1>
            <p class="text-muted mb-4" th:text="${quiz.title}">Quiz Name</p>

            <div class="row g-3 justify-content-center mb-4">
                <div class="col-auto">
                    <div class="stat-pill">
                        <i class="bi bi-check-circle text-success me-1"></i>
                        <span th:text="${result.score}">8</span> Correct
                    </div>
                </div>
                <div class="col-auto">
                    <div class="stat-pill">
                        <i class="bi bi-x-circle text-danger me-1"></i>
                        <span th:text="${result.totalQuestions - result.score}">4</span> Wrong
                    </div>
                </div>
                <div class="col-auto">
                    <div class="stat-pill">
                        <i class="bi bi-journal me-1"></i>
                        <span th:text="${result.totalQuestions}">12</span> Total
                    </div>
                </div>
                <div class="col-auto">
                    <div class="stat-pill">
                        <i class="bi bi-clock me-1"></i>
                        <span th:text="${result.timeTakenSeconds / 60}">5</span>m
                        <span th:text="${result.timeTakenSeconds % 60}">30</span>s
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 justify-content-center">
                <a th:href="@{/quiz/categories}" class="btn btn-accent"><i class="bi bi-arrow-repeat me-1"></i>Try Another Quiz</a>
                <a th:href="@{/leaderboard}" class="btn btn-outline-light"><i class="bi bi-trophy me-1"></i>Leaderboard</a>
            </div>
        </div>

        <!-- Answer Review -->
        <h2 class="h4 fw-bold mb-4"><i class="bi bi-list-check text-accent me-2"></i>Answer Review</h2>

        <div th:each="question, qIter : ${questions}" class="answer-review-card glass-card mb-3 animate-slide-up"
             th:style="'animation-delay: ' + ${qIter.index * 0.05} + 's'">

            <div class="d-flex align-items-start gap-3">
                <span class="badge bg-dark mt-1" th:text="'Q' + ${qIter.index + 1}">Q1</span>
                <div class="flex-grow-1">
                    <h5 class="fw-medium mb-3" th:text="${question.questionText}">Question?</h5>

                    <div th:each="option : ${question.options}" class="review-option mb-2"
                         th:classappend="${option.correct ? ' correct-option' : (result.selectedOptions.get(question.id) == option.id ? ' bg-danger bg-opacity-10 rounded' : '')}">
                        <i class="bi" th:classappend="${option.correct ? ' bi-check-circle-fill text-success' : (result.selectedOptions.get(question.id) == option.id ? ' bi-x-circle-fill text-danger' : ' bi-circle text-muted')}"></i>
                        <span th:text="${option.optionText}" th:classappend="${option.correct ? ' fw-bold text-success' : (result.selectedOptions.get(question.id) == option.id ? ' fw-bold text-danger' : '')}">Option</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-4 mt-5 glass-footer">
    <p class="text-muted mb-0"><i class="bi bi-mortarboard-fill text-accent"></i> QuizMaster &copy; 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
