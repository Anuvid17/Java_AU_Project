<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category.name + ' Quizzes | QuizMaster'}">Quizzes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}">
            <i class="bi bi-mortarboard-fill text-accent"></i><span>Quiz<span class="text-accent">Master</span></span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-fill me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/quiz/categories}"><i class="bi bi-journal-code me-1"></i>Quizzes</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/leaderboard}"><i class="bi bi-trophy-fill me-1"></i>Leaderboard</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="main-content">
    <div class="container">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4 animate-fade-in">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/quiz/categories}" class="text-accent">Categories</a></li>
                <li class="breadcrumb-item active text-light" th:text="${category.name}">Category</li>
            </ol>
        </nav>

        <!-- Alert Messages -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="mb-5 animate-fade-in">
            <h1 class="display-6 fw-bold" th:text="${category.name}">Category</h1>
            <p class="text-muted lead" th:text="${category.description}">Description</p>
        </div>

        <div class="row g-4">
            <div class="col-md-6" th:each="quiz, iter : ${quizzes}">
                <div class="quiz-card glass-card animate-slide-up" th:style="'animation-delay: ' + ${iter.index * 0.1} + 's'">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h3 class="h5 fw-bold mb-1" th:text="${quiz.title}">Quiz Title</h3>
                            <p class="text-muted small mb-0" th:text="${quiz.description}">Description</p>
                        </div>
                        <span class="badge bg-accent" th:if="${attemptedMap[quiz.id]}">
                            <i class="bi bi-check-circle me-1"></i>Completed
                        </span>
                    </div>

                    <div class="quiz-meta d-flex gap-3 mb-3">
                        <span class="text-muted"><i class="bi bi-clock me-1"></i><span th:text="${quiz.durationMinutes}">15</span> min</span>
                        <span class="text-muted"><i class="bi bi-question-circle me-1"></i><span th:text="${quiz.questions.size()}">12</span> questions</span>
                    </div>

                    <!-- Show result if already attempted -->
                    <div th:if="${attemptedMap[quiz.id]}" class="result-preview mb-3">
                        <div class="d-flex align-items-center justify-content-between">
                            <span>Your Score:</span>
                            <span class="fw-bold">
                                <span th:text="${resultMap[quiz.id].score}">0</span>/<span th:text="${resultMap[quiz.id].totalQuestions}">0</span>
                                (<span th:text="${#numbers.formatDecimal(resultMap[quiz.id].percentage, 0, 1)}">0</span>%)
                            </span>
                        </div>
                        <div class="progress mt-2" style="height: 8px;">
                            <div class="progress-bar" role="progressbar"
                                 th:style="'width: ' + ${resultMap[quiz.id].percentage} + '%'"
                                 th:classappend="${resultMap[quiz.id].percentage >= 70 ? 'bg-success' : (resultMap[quiz.id].percentage >= 40 ? 'bg-warning' : 'bg-danger')}">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <a th:href="@{/quiz/attempt/{id}(id=${quiz.id})}"
                           th:if="${!attemptedMap[quiz.id]}"
                           class="btn btn-accent flex-grow-1">
                            <i class="bi bi-play-fill me-1"></i>Start Quiz
                        </a>
                        <a th:href="@{/quiz/attempt/{id}(id=${quiz.id})}"
                           th:if="${attemptedMap[quiz.id]}"
                           class="btn btn-outline-secondary flex-grow-1 disabled">
                            <i class="bi bi-lock me-1"></i>Already Attempted
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-4 mt-5 glass-footer">
    <p class="text-muted mb-0"><i class="bi bi-mortarboard-fill text-accent"></i> QuizMaster &copy; 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
